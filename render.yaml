services:
  - type: web
    name: livescore-bot
    env: docker
    repo: https://github.com/entretorres1x2-droid/livescore-bot
    branch: master
    dockerfilePath: ./Dockerfile
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TEMPORADA
        value: "2026"
      - key: JORNADA_QUINIELA
        value: "68"
      - key: JORNADA_QUINIGOL
        value: "78"
      - key: POLL_INTERVAL
        value: "60"
