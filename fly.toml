app = "livescore-quiniela-bot"
primary_region = "mad"

[build]
  dockerfile = "Dockerfile"

[mounts]
  source = "data_volume"
  destination = "/app/datos"

[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
